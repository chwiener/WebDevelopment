<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Test Game</title>
</head>
<body>
<h1>Memory Test!</h1>
 <div class="container">

     <div class="red">
         <div id="boxOne" class="red" role="button" tabindex="0">
            <div class="triangle"></div>
         </div>
     </div>

     <div class="blue">
        <div id="boxTwo" class="blue" role="button" tabindex="0">
            <div class="star"></div>
        </div>
     </div>

     <div class="yellow">
        <div id="boxThree" class="yellow" role="button" tabindex="0">
            <div class="circle"></div>
        </div>
     </div>

     <div class="green">
        <div id="boxFour" class="green" role="button" tabindex="0">
            <div class="rhombus"></div>
        </div>
     </div>
 </div>

</body>
<style>
    .container{
        display: grid;
        grid-template-areas:
                "red blue"
                "yellow green";
    }
    [role="button"] {
        cursor: pointer;
    }
    #boxOne {
        height: 155px;
        width: 175px;
        background-color: red;
        margin-bottom: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .triangle {
        width: 0;
        height: 0;
        border-left: 50px solid transparent;
        border-right: 50px solid transparent;
        border-bottom: 100px solid #b02020; /* Triangle color */
    }
    #boxTwo {
        height: 155px;
        width: 175px;
        background-color: blue;
        margin-bottom: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .star {
        width: 100px;
        height: 100px;
        background: #2c88d4;
        /* Cutting the square into a 5-pointed star */
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    #boxThree {
        height: 155px;
        width: 175px;
        background-color: yellow;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .circle{
        width: 50%;
        height: 50%;
        background-color: #d6cf00;
        border-radius: 100%;
    }
    #boxFour {
        height: 155px;
        width: 175px;
        background-color: green;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .rhombus{
        width: 90px;
        height: 75px;
        background-color: #43cc5a;
        transform:rotate(45deg);
        margin: 50px;
    }

    #boxOne.active{background-color: #ff6666;}
    #boxTwo.active{background-color: #66b2ff;}
    #boxThree.active{background-color: #ffff99;}
    #boxFour.active{background-color: #99ff99;}
</style>
<script>
<!--   arrays tracking available buttons-->
    const buttonOptions = ['boxOne', 'boxTwo', 'boxThree', 'boxFour'];

//     arrays tracking game pattern options
    let gamePattern = [];
    let userPattern = [];
    let gameStarted = false;

    // click listeners for buttons
    buttonOptions.forEach(id => {
        const element = document.getElementById(id);
    })

    element.addEventListener('click', () => handleUserInput (id));

    element.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handleUserInput(id);
        }
    })

    function handleUserInput(buttonId) {
        if (!gameStarted) return;

        flashButton(buttonId);
        userPattern.push(buttonId);

        checkAnswer
