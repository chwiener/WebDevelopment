<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date</title>
</head>
<body>
  <h1>Days Until 16 Birthday</h1>
    <p>Days Remaining: <span id="countdown"></span></p>
</body>

<script>
  let now = new Date();
  console.log(now)
  console.log("NOW: " + now);

  let then = new Date("5/10/26 10:00:00");
  console.log("THEN: " + then)

  console.log((then - now)/1000/60/60/24)

  let diffInMs = then - now;
  let daysLeft = Math.floor(diffInMs/(1000*60*60*24));

  document.getElementById("countdown").innerText = daysLeft;
</script>

</html>
