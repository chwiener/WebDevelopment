<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date</title>
</head>
<body>
  <h1>Date Object</h1>
</body>

<script>
  let now = new Date();
  console.log(now)
  console.log("NOW: " + now);

  let then = new Date("5/10/26 10:00:00");
  console.log("THEN: " + then)

  console.log((then - now)/1000/60/60/24)
</script>

</html>
